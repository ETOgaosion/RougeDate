<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 2 crossed swords, pure white silhouette -->
  <g fill="#ffffff">
    <!-- sword 1 -->
    <g transform="rotate(-45 256 256)">
      <!-- blade -->
      <rect x="244" y="86" width="24" height="260" rx="8" ry="8"/>
      <!-- tip -->
      <polygon points="256,44 236,86 276,86"/>
      <!-- guard -->
      <rect x="206" y="336" width="100" height="18" rx="9" ry="9"/>
      <!-- grip -->
      <rect x="246" y="354" width="20" height="58" rx="8" ry="8"/>
      <!-- pommel -->
      <circle cx="256" cy="424" r="18"/>
    </g>

    <!-- sword 2 -->
    <g transform="rotate(45 256 256)">
      <!-- blade -->
      <rect x="244" y="86" width="24" height="260" rx="8" ry="8"/>
      <!-- tip -->
      <polygon points="256,44 236,86 276,86"/>
      <!-- guard -->
      <rect x="206" y="336" width="100" height="18" rx="9" ry="9"/>
      <!-- grip -->
      <rect x="246" y="354" width="20" height="58" rx="8" ry="8"/>
      <!-- pommel -->
      <circle cx="256" cy="424" r="18"/>
    </g>
  </g>
</svg>